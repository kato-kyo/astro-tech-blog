# ===========================================
# 基本情報
# ===========================================
title: Tech Blog
subtitle: 技術記事と学習記録
url: https://yourdomain.com
locale: ja
author: Your Name

# ===========================================
# SEO・メタデータ
# ===========================================
seo:
  # サイト全体のデフォルト説明文
  description: 技術に関する記事や学習記録、開発の知見を共有するブログです。

  # ホームページ用の詳細説明文
  homeDescription: >
    技術に関する記事や学習記録、開発の知見を共有するブログです。
    プログラミング、Web開発、インフラなどの情報を発信しています。

  # OGP画像（public/配下のパス）
  defaultOgImage: /og-image.jpg

  # ページタイトルの区切り文字
  titleSeparator: ' - '

  # サイト名（OGPなどで使用）
  siteName: Tech Blog

# ===========================================
# ナビゲーション
# ===========================================
nav:
  # ヘッダーのサイトタイトル表示名
  headerTitle: Tech Blog

# ===========================================
# ページ表示設定
# ===========================================
pages:
  # Aboutページの表示/非表示
  showAbout: true
  # Contactページの表示/非表示
  showContact: true

# ===========================================
# RSS設定
# ===========================================
rss:
  title: Tech Blog RSS Feed
  description: 技術に関する記事や学習記録、開発の知見を共有するブログです。

# ===========================================
# ページネーション
# ===========================================
pagination:
  postsPerPage: 10

# ===========================================
# Aboutページ
# ===========================================
about:
  # Aboutページの説明文
  description: >
    Tech Blogの管理人のプロフィールページです。
    経歴、スキル、実績などを紹介しています。

  # Aboutページの挨拶文
  greeting: こんにちは！{siteName}の管理人です。

# ===========================================
# フッター情報
# ===========================================
footer:
  siteName: Tech Blog
  description: 技術に関する記事や学習記録、開発の知見を共有するブログです。
  extendedDescription: >
    日々の学習や実務で得た知識を記録し、
    同じ道を歩む方々と情報を共有しています。
  copyright: Tech Blog. All rights reserved.

# ===========================================
# ソーシャルメディア（将来用）
# ===========================================
social:
  twitter: '@yourusername'
  github: https://github.com/yourusername
